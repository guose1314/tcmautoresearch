name: Quality Control

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'tools/**/*.py'
      - '.github/workflows/quality-control.yml'
      - 'README.md'
      - 'docs/quality-control-system.md'
  push:
    branches:
      - main
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'tools/**/*.py'
      - '.github/workflows/quality-control.yml'
      - 'README.md'
      - 'docs/quality-control-system.md'

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt bcrypt

      - name: Run new-module unit tests
        run: |
          python -m pytest \
            tests/test_output_generator.py \
            tests/test_tcm_lexicon.py \
            tests/test_common_utils.py \
            tests/test_analysis_modules.py \
            tests/test_web_auth.py \
            tests/test_ai_assistant.py \
            -v --tb=short

      - name: Run Cypher injection scan
        run: python tools/cypher_injection_scan.py

      - name: Run unified quality gate
        run: python tools/quality_gate.py --report output/quality-gate.json

      - name: Upload quality gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-report
          path: |
            output/quality-gate.json
            output/real_observe_smoke/latest.json
            output/real_observe_smoke/dossier.md
            output/real_observe_smoke/timeline.jsonl
            docs/architecture/dependency-graph.json
            docs/architecture/dependency-graph.mmd
            docs/architecture/dependency-graph.md
          if-no-files-found: warn