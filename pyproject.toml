# ── 回归基线 (2026-04-20) ──
# baseline: 2893 pass / 4 xfail / 2 skip

[tool.pytest.ini_options]
minversion = "7.0"
markers = [
    "known_failure: 已知失败，已登记根因，暂不修复 (Phase F-4)",
]
filterwarnings = [
    # ── 第三方库噪音 ──
    # jieba 内部使用已弃用的 pkg_resources
    "ignore:pkg_resources is deprecated:UserWarning",
    # setuptools / sphinxcontrib 命名空间弃用
    "ignore:Deprecated call to `pkg_resources.declare_namespace:DeprecationWarning",
    # websockets.legacy / WebSocketServerProtocol 弃用（uvicorn 内部）
    "ignore:websockets.legacy is deprecated:DeprecationWarning",
    "ignore:websockets.server.WebSocketServerProtocol is deprecated:DeprecationWarning",
    # FastAPI on_event 弃用（等待 lifespan 迁移）
    "ignore:on_event is deprecated, use lifespan event handlers instead:DeprecationWarning",
    # neo4j 驱动未关闭警告（测试环境 GC 时序问题）
    "ignore:unclosed.*Neo4jDriver:ResourceWarning",
    # web_console.job_manager 迁移提示
    "ignore:web_console.job_manager 已迁移:DeprecationWarning",
    # ── 项目内部迁移提示（已知，不影响功能）──
    "ignore:src\\.semantic_modeling\\.semantic_graph_builder 已迁移:DeprecationWarning",
    "ignore:run_iteration_cycle\\(\\) 是旧:DeprecationWarning",
    # ── Enum 类名以 Test 开头导致 pytest 误收集 ──
    "ignore:cannot collect test class 'TestPriority':pytest.PytestCollectionWarning",
    "ignore:cannot collect test class 'TestType':pytest.PytestCollectionWarning",
]
