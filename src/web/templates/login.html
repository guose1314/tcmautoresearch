<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>登录 — 中医智慧科研平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"
    ></script>
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-teal-50 flex items-center justify-center"
  >
    <div x-data="loginApp()" x-cloak class="w-full max-w-md px-6">
      <!-- Card -->
      <div class="bg-white rounded-2xl shadow-xl p-8 space-y-6">
        <!-- Logo / Title -->
        <div class="text-center space-y-2">
          <span class="text-5xl">🏥</span>
          <h1 class="text-2xl font-bold text-gray-800">中医智慧科研平台</h1>
          <p class="text-sm text-gray-500">请登录以继续</p>
        </div>

        <!-- Error Alert -->
        <div
          x-show="errorMsg"
          x-transition
          class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm flex items-center gap-2"
        >
          <svg class="w-5 h-5 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path
              fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z"
              clip-rule="evenodd"
            />
          </svg>
          <span x-text="errorMsg"></span>
        </div>

        <!-- Form -->
        <form @submit.prevent="handleLogin" class="space-y-5">
          <!-- Username -->
          <div>
            <label
              for="username"
              class="block text-sm font-medium text-gray-700 mb-1"
              >用户名</label
            >
            <input
              id="username"
              type="text"
              x-model="username"
              required
              autocomplete="username"
              :disabled="loading"
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition disabled:opacity-50"
              placeholder="请输入用户名"
            />
          </div>

          <!-- Password -->
          <div>
            <label
              for="password"
              class="block text-sm font-medium text-gray-700 mb-1"
              >密码</label
            >
            <div class="relative">
              <input
                id="password"
                :type="showPwd ? 'text' : 'password'"
                x-model="password"
                required
                autocomplete="current-password"
                :disabled="loading"
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition disabled:opacity-50 pr-10"
                placeholder="请输入密码"
              />
              <button
                type="button"
                @click="showPwd = !showPwd"
                tabindex="-1"
                class="absolute inset-y-0 right-3 flex items-center text-gray-400 hover:text-gray-600"
              >
                <svg
                  x-show="!showPwd"
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
                <svg
                  x-show="showPwd"
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 012.31-3.814M6.938 6.938A9.966 9.966 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.97 9.97 0 01-4.043 5.206M6.938 6.938L3 3m3.938 3.938l3.124 3.124M21 21l-3.938-3.938m0 0l-3.124-3.124"
                  />
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            :disabled="loading"
            class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-semibold rounded-lg transition flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed"
          >
            <svg
              x-show="loading"
              class="animate-spin w-5 h-5"
              fill="none"
              viewBox="0 0 24 24"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              />
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              />
            </svg>
            <span x-text="loading ? '登录中…' : '登 录'"></span>
          </button>
        </form>
      </div>

      <!-- Footer -->
      <p class="text-center text-xs text-gray-400 mt-6">
        &copy; 2026 中医智慧科研平台
      </p>
    </div>

    <script>
      function loginApp() {
        return {
          username: "",
          password: "",
          errorMsg: "",
          loading: false,
          showPwd: false,

          async handleLogin() {
            this.errorMsg = "";

            if (!this.username.trim() || !this.password) {
              this.errorMsg = "请输入用户名和密码";
              return;
            }

            this.loading = true;
            try {
              const formData = new URLSearchParams();
              formData.append("username", this.username.trim());
              formData.append("password", this.password);

              const resp = await fetch("/api/auth/login", {
                method: "POST",
                headers: {
                  "Content-Type": "application/x-www-form-urlencoded",
                },
                body: formData,
              });

              const data = await resp.json();

              if (!resp.ok) {
                this.errorMsg =
                  data.detail || data.message || "登录失败，请重试";
                return;
              }

              // 保存 JWT 到 localStorage
              const token = data.access_token || data.token;
              if (token) {
                localStorage.setItem("access_token", token);
                localStorage.setItem("token_type", data.token_type || "bearer");
              }

              // 跳转到 dashboard
              window.location.href = "/dashboard";
            } catch (e) {
              this.errorMsg = "网络错误，请检查连接后重试";
            } finally {
              this.loading = false;
            }
          },
        };
      }
    </script>
  </body>
</html>
