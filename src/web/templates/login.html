<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>登录 — 中医智慧科研平台</title>
    <script src="/static/js/tailwind.min.js"></script>
    <!-- 必须在 Alpine 之前注册 loginApp，避免 x-data 求值时函数尚未定义 -->
    <script src="/static/js/login.js"></script>
    <script defer src="/static/js/alpine.min.js"></script>
    <link rel="stylesheet" href="/static/css/login.css" />
    <noscript>
      <style>
        [x-cloak]{display:block !important;}
        #passwordForm,#apiKeyForm{display:block !important;}
      </style>
    </noscript>
    <!-- 即使 Alpine 未加载，也保证账号密码表单首屏直接可见 -->
    <style>
      #passwordForm{display:block;}
      #apiKeyForm{display:none;}
    </style>
  </head>
  <body class="min-h-screen overflow-x-hidden">
    <main
      class="mx-auto flex min-h-screen max-w-md flex-col justify-center px-4 py-10 sm:px-6"
    >
      <header class="mb-8 text-center">
        <p class="text-xs uppercase tracking-[0.32em] text-emerald-700/70">
          TCM Research Operating System
        </p>
        <h1
          class="brand-title mt-3 text-3xl font-semibold text-emerald-900 sm:text-4xl"
        >
          中医智慧科研平台
        </h1>
        <p class="mt-2 text-sm text-slate-500">
          从古籍观察到知识图谱与论文生成的一体化研究中枢
        </p>
      </header>

      <section
        x-data="loginApp()"
        class="auth-card glass-panel rounded-3xl border border-white/60 p-6 sm:p-8"
        aria-labelledby="loginHeading"
      >
        <div class="flex items-start justify-between gap-4">
          <div>
            <h2
              id="loginHeading"
              class="brand-title text-xl font-semibold text-slate-900"
            >
              进入管理界面
            </h2>
            <p
              class="mt-1 inline-flex items-center gap-2 text-xs text-slate-500"
              aria-live="polite"
            >
              <span class="status-dot bg-emerald-500" aria-hidden="true"></span>
              <span x-text="statusHint">正在检测认证模式…</span>
            </p>
          </div>
          <span
            class="rounded-full border border-emerald-100 bg-emerald-50 px-3 py-1 text-[11px] font-semibold uppercase tracking-wider text-emerald-700"
            x-text="authConfig.authMode || 'password'"
          >
            password
          </span>
        </div>

        <!-- 错误提示 -->
        <div
          x-show="errorMsg"
          x-transition
          role="alert"
          aria-live="assertive"
          class="mt-5 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700"
        >
          <div class="flex items-start gap-2">
            <span aria-hidden="true" class="mt-0.5 font-semibold">!</span>
            <span x-text="errorMsg"></span>
          </div>
        </div>

        <!-- 模式切换：仅当后端同时支持密码与 API Key 时出现 -->
        <div
          x-show="authConfig.supportsPassword && authConfig.supportsApiKey"
          class="mt-5 grid grid-cols-2 gap-2 rounded-2xl bg-emerald-50/70 p-1.5"
          role="tablist"
          aria-label="登录方式"
        >
          <button
            type="button"
            role="tab"
            :aria-selected="loginMode === 'password'"
            @click="loginMode = 'password'; errorMsg = ''"
            :class="loginMode === 'password' ? 'mode-chip-active' : 'mode-chip text-slate-600 hover:text-slate-900'"
            class="rounded-xl px-4 py-2 text-sm font-semibold transition"
          >
            账号密码
          </button>
          <button
            type="button"
            role="tab"
            :aria-selected="loginMode === 'api_key'"
            @click="loginMode = 'api_key'; errorMsg = ''"
            :class="loginMode === 'api_key' ? 'mode-chip-active' : 'mode-chip text-slate-600 hover:text-slate-900'"
            class="rounded-xl px-4 py-2 text-sm font-semibold transition"
          >
            管理 API Key
          </button>
        </div>

        <!-- 账号密码表单 -->
        <form
          x-show="loginMode === 'password'"
          x-transition.opacity
          @submit.prevent="handlePasswordLogin"
          class="mt-6 space-y-4"
          :aria-busy="loading"
          novalidate
          id="passwordForm"
        >
          <div>
            <label
              for="username"
              class="mb-1.5 block text-sm font-medium text-slate-700"
            >
              用户名
            </label>
            <input
              id="username"
              name="username"
              type="text"
              x-model="username"
              required
              autocomplete="username"
              autocapitalize="off"
              spellcheck="false"
              :disabled="loading"
              class="soft-input w-full rounded-xl px-4 py-2.5 text-slate-800 disabled:cursor-not-allowed disabled:opacity-60"
              placeholder="请输入用户名"
            />
          </div>

          <div>
            <div class="mb-1.5 flex items-baseline justify-between gap-3">
              <label
                for="password"
                class="block text-sm font-medium text-slate-700"
              >
                密码
              </label>
              <span class="text-[11px] text-slate-400">
                来源：secrets.yml › security.console_auth.users
              </span>
            </div>
            <div class="relative">
              <input
                id="password"
                name="password"
                :type="showPwd ? 'text' : 'password'"
                x-model="password"
                required
                autocomplete="current-password"
                :disabled="loading"
                class="soft-input w-full rounded-xl px-4 py-2.5 pr-14 text-slate-800 disabled:cursor-not-allowed disabled:opacity-60"
                placeholder="请输入密码"
              />
              <button
                type="button"
                tabindex="0"
                @click="showPwd = !showPwd"
                :aria-pressed="showPwd"
                :aria-label="showPwd ? '隐藏密码' : '显示密码'"
                class="absolute inset-y-0 right-3 flex items-center text-xs font-medium text-slate-400 transition hover:text-slate-700"
              >
                <span x-text="showPwd ? '隐藏' : '显示'"></span>
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between text-sm text-slate-500">
            <label class="flex cursor-pointer items-center gap-2">
              <input
                type="checkbox"
                x-model="remember"
                class="h-4 w-4 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500"
              />
              <span>记住登录状态</span>
            </label>
          </div>

          <button
            type="submit"
            :disabled="loading"
            class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-emerald-700 via-emerald-600 to-teal-600 px-4 py-2.5 text-sm font-semibold text-white shadow-md transition hover:-translate-y-0.5 hover:shadow-lg disabled:cursor-not-allowed disabled:opacity-60"
          >
            <svg
              x-show="loading"
              class="h-5 w-5 animate-spin"
              fill="none"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              ></path>
            </svg>
            <span x-text="loading ? '登录中…' : '登录并进入管理界面'"></span>
          </button>
        </form>

        <!-- API Key 表单 -->
        <form
          x-show="loginMode === 'api_key'"
          x-transition.opacity
          @submit.prevent="handleApiKeyLogin"
          class="mt-6 space-y-4"
          :aria-busy="loading"
          novalidate
          id="apiKeyForm"
        >
          <div>
            <label
              for="apiKeyName"
              class="mb-1.5 block text-sm font-medium text-slate-700"
            >
              显示名称
              <span class="font-normal text-slate-400">（可选）</span>
            </label>
            <input
              id="apiKeyName"
              type="text"
              x-model="apiKeyName"
              :disabled="loading"
              autocomplete="username"
              class="soft-input w-full rounded-xl px-4 py-2.5 text-slate-800 disabled:cursor-not-allowed disabled:opacity-60"
              placeholder="例如：管理员"
            />
          </div>

          <div>
            <label
              for="apiKey"
              class="mb-1.5 block text-sm font-medium text-slate-700"
            >
              管理 API Key
            </label>
            <input
              id="apiKey"
              type="password"
              x-model="apiKey"
              required
              autocomplete="current-password"
              :disabled="loading"
              class="soft-input w-full rounded-xl px-4 py-2.5 text-slate-800 disabled:cursor-not-allowed disabled:opacity-60"
              placeholder="请输入管理 API Key"
            />
          </div>

          <button
            type="submit"
            :disabled="loading"
            class="inline-flex w-full items-center justify-center gap-2 rounded-xl bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-60"
          >
            <svg
              x-show="loading"
              class="h-5 w-5 animate-spin"
              fill="none"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              ></path>
            </svg>
            <span x-text="loading ? '验证中…' : '验证并进入管理台'"></span>
          </button>
        </form>

        <!-- 访客入口（仅在后端允许时展示） -->
        <button
          x-show="authConfig.guestAllowed"
          @click="handleGuestLogin"
          :disabled="loading"
          type="button"
          class="mt-4 inline-flex w-full items-center justify-center rounded-xl border border-slate-200 bg-white/80 px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:border-emerald-200 hover:bg-emerald-50 disabled:cursor-not-allowed disabled:opacity-60"
        >
          以访客身份进入
        </button>

        <!-- 进入后落点（统一仅一份） -->
        <fieldset
          class="mt-6 rounded-2xl border border-slate-200 bg-white/70 p-4"
        >
          <legend class="px-2 text-xs font-semibold text-slate-500">
            登录后跳转
          </legend>
          <div class="mt-2 grid gap-2 sm:grid-cols-2">
            <label
              :class="destination === 'dashboard' ? 'border-emerald-400 bg-emerald-50/70' : 'border-slate-200 bg-white'"
              class="cursor-pointer rounded-xl border px-3 py-2.5 transition"
            >
              <div class="flex items-center justify-between gap-2">
                <span class="text-sm font-semibold text-slate-800"
                  >科研主控台</span
                >
                <input
                  type="radio"
                  x-model="destination"
                  value="dashboard"
                  name="destination"
                  class="h-4 w-4 text-emerald-600 focus:ring-emerald-500"
                />
              </div>
              <p class="mt-1 text-[11px] leading-5 text-slate-500">
                流程总览、任务管理、AI 助手、知识图谱
              </p>
            </label>

            <label
              :class="destination === 'console' ? 'border-emerald-400 bg-emerald-50/70' : 'border-slate-200 bg-white'"
              class="cursor-pointer rounded-xl border px-3 py-2.5 transition"
            >
              <div class="flex items-center justify-between gap-2">
                <span class="text-sm font-semibold text-slate-800"
                  >研究控制台</span
                >
                <input
                  type="radio"
                  x-model="destination"
                  value="console"
                  name="destination"
                  class="h-4 w-4 text-emerald-600 focus:ring-emerald-500"
                />
              </div>
              <p class="mt-1 text-[11px] leading-5 text-slate-500">
                旧版控制台视图（兼容工作流）
              </p>
            </label>
          </div>
        </fieldset>
      </section>

      <footer class="mt-8 text-center text-xs text-slate-400">
        © 2026 中医智慧科研平台 · 认证后进入可执行任务、AI 助手、知识图谱与输出管理界面
      </footer>
    </main>
  </body>
</html>
