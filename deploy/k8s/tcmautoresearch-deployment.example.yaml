# K8s 示例清单状态口径（2026-04-15）：
# - apply 成功、Deployment ready、/readiness 与 /liveness 通过，只表示部署动作和 API 进程已就绪，不自动等同于结构化存储处于“双写完成”。
# - PostgreSQL 可写而 Neo4j 未启用、初始化失败或当前不可用时，应明确记为“仅 PG 模式”。
# - 历史图投影、Observe 版本元数据或文献学结构化资产尚未补齐时，应继续记为“待回填”。
# - 迁移、health check 或 drift 诊断若仍有告警，应记为“schema drift 待治理”。
# - 统一术语来源：README 的“结构化存储状态词汇表”。
# 运维约定：不要手工修改 alembic.ini 的 sqlalchemy.url。
# 推荐迁移命令：
#   kubectl exec -n <namespace> deploy/tcmautoresearch-api -- alembic -x environment=production upgrade head
# 如果不想手工 exec，可直接 apply 配套示例：
#   kubectl apply -f deploy/k8s/tcmautoresearch-migrate-job.example.yaml
# 定向排障命令：
#   kubectl exec -n <namespace> deploy/tcmautoresearch-api -- alembic -x url=postgresql://tcm:<password>@<postgres-service>:5432/tcmautoresearch upgrade head
# 如果目标库是早期通过 ORM create_all() 初始化、没有 alembic_version：
#   kubectl exec -n <namespace> deploy/tcmautoresearch-api -- alembic -x url=postgresql://tcm:<password>@<postgres-service>:5432/tcmautoresearch stamp 3e5089f32f9a
#   kubectl exec -n <namespace> deploy/tcmautoresearch-api -- alembic -x url=postgresql://tcm:<password>@<postgres-service>:5432/tcmautoresearch upgrade head
# 应用默认启动命令：
#   python -m src.api.main --config config.yml --environment production --host 0.0.0.0 --port 8000
apiVersion: v1
kind: Secret
metadata:
  name: tcmautoresearch-secrets
type: Opaque
stringData:
  TCM_DB_PASSWORD: "replace-with-postgresql-password"
  TCM_NEO4J_PASSWORD: "replace-with-neo4j-password"
  TCM_SECRET__MODELS__LLM__API_KEY: "sk-prod-xxx"
  TCM_SECRET__CLINICAL_GAP_ANALYSIS__API_KEY: "sk-gap-prod-xxx"
  TCM_SECRET__LITERATURE_RETRIEVAL__PUBMED_EMAIL: "research@example.com"
  TCM_SECRET__LITERATURE_RETRIEVAL__PUBMED_API_KEY: "pubmed-prod-key"
  TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__SCOPUS__API_KEY: "scopus-prod-key"
  TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__WEB_OF_SCIENCE__API_KEY: "wos-prod-key"
  TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__EMBASE__API_KEY: "embase-prod-key"
  TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__COCHRANE__API_KEY: "cochrane-prod-key"
  TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__LEXICOMP__API_KEY: "lexicomp-prod-key"
  TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__CLINICALKEY__API_KEY: "clinicalkey-prod-key"
  TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__GOOGLE_SCHOLAR__API_KEY: "google-scholar-provider-key"
  TCM_SECRET__MONITORING__ALERTING__EMAIL__PASSWORD: "smtp-prod-password"
  TCM_SECRET__MONITORING__ALERTING__WEBHOOK_URL: "https://hooks.example.com/prod"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcmautoresearch-api
  labels:
    app: tcmautoresearch-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tcmautoresearch-api
  template:
    metadata:
      labels:
        app: tcmautoresearch-api
    spec:
      containers:
        - name: api
          image: ghcr.io/guose1314/tcmautoresearch:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.api.main"]
          args: ["--config", "config.yml", "--environment", "production", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: TCM_ENV
              value: "production"
          envFrom:
            - secretRef:
                name: tcmautoresearch-secrets
          # 探针通过只说明 API 进程可服务；不要据此把环境直接判成“双写完成”。
          # 若 Neo4j 不可用或历史结构化资产未补齐，仍应分别记为“仅 PG 模式”或“待回填”。
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: tcmautoresearch-api
spec:
  selector:
    app: tcmautoresearch-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP