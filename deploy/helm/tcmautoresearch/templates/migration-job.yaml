{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-db-migrate" (include "tcmautoresearch.fullname" .) | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "tcmautoresearch.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  {{- if or .Values.migrations.useHook .Values.migrations.annotations }}
  annotations:
    {{- if .Values.migrations.useHook }}
    helm.sh/hook: {{ join "," .Values.migrations.hook.events | quote }}
    helm.sh/hook-delete-policy: {{ join "," .Values.migrations.hook.deletePolicy | quote }}
    helm.sh/hook-weight: {{ .Values.migrations.hook.weight | quote }}
    {{- end }}
    {{- with .Values.migrations.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "tcmautoresearch.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
      {{- with .Values.migrations.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "tcmautoresearch.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: db-migrate
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.migrations.command | nindent 12 }}
          args:
            {{- toYaml .Values.migrations.args | nindent 12 }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key, $value := .Values.migrations.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- if and .Values.migrations.useHook .Values.secrets.create (not .Values.secrets.existingSecret) }}
            {{- range $key, $value := .Values.secrets.stringData }}
            {{- if $value }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
          {{- if or .Values.secrets.existingSecret (and .Values.secrets.create (not .Values.migrations.useHook)) }}
          envFrom:
            - secretRef:
                name: {{ include "tcmautoresearch.secretName" . }}
          {{- end }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}