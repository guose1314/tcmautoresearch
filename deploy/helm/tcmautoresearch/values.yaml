replicaCount: 2

image:
  repository: ghcr.io/guose1314/tcmautoresearch
  pullPolicy: IfNotPresent
  tag: latest

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

app:
  command:
    - python
    - -m
    - src.api.main
  args:
    - --config
    - config.yml
    - --environment
    - production
    - --host
    - 0.0.0.0
    - --port
    - "8000"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: tcmautoresearch.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

env:
  TCM_ENV: production

migrations:
  # -- Enable a dedicated migration Job for Alembic upgrades.
  enabled: false
  # -- Prefer true for Helm-managed installs. For a standalone Job, use deploy/k8s/tcmautoresearch-migrate-job.example.yaml.
  useHook: true
  hook:
    events:
      - pre-install
      - pre-upgrade
    deletePolicy:
      - before-hook-creation
      - hook-succeeded
    weight: 0
  backoffLimit: 1
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 600
  annotations: {}
  podAnnotations: {}
  env: {}
  command:
    - alembic
  args:
    - -x
    - environment=production
    - upgrade
    - head
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

probes:
  readiness:
    path: /readiness
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    path: /liveness
    initialDelaySeconds: 20
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3

secrets:
  # -- Set to false to disable Secret creation entirely (e.g. secrets managed externally)
  create: true
  # -- Use a pre-existing Secret instead of creating one; set create=false when using this
  existingSecret: ""
  stringData:
    # ── Database (PostgreSQL) ──
    TCM_DB_PASSWORD: "replace-with-postgresql-password"
    # ── Graph database (Neo4j) ──
    TCM_NEO4J_PASSWORD: "replace-with-neo4j-password"
    # ── LLM API keys ──
    TCM_SECRET__MODELS__LLM__API_KEY: "sk-prod-xxx"
    TCM_SECRET__CLINICAL_GAP_ANALYSIS__API_KEY: "sk-gap-prod-xxx"
    # ── Literature retrieval ──
    TCM_SECRET__LITERATURE_RETRIEVAL__PUBMED_EMAIL: "research@example.com"
    TCM_SECRET__LITERATURE_RETRIEVAL__PUBMED_API_KEY: "pubmed-prod-key"
    TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__SCOPUS__API_KEY: "scopus-prod-key"
    TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__WEB_OF_SCIENCE__API_KEY: "wos-prod-key"
    TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__EMBASE__API_KEY: "embase-prod-key"
    TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__COCHRANE__API_KEY: "cochrane-prod-key"
    TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__LEXICOMP__API_KEY: "lexicomp-prod-key"
    TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__CLINICALKEY__API_KEY: "clinicalkey-prod-key"
    TCM_SECRET__LITERATURE_RETRIEVAL__SOURCE_CREDENTIALS__GOOGLE_SCHOLAR__API_KEY: "google-scholar-provider-key"
    # ── Monitoring & alerting ──
    TCM_SECRET__MONITORING__ALERTING__EMAIL__PASSWORD: "smtp-prod-password"
    TCM_SECRET__MONITORING__ALERTING__WEBHOOK_URL: "https://hooks.example.com/prod"
    # ── Security ──
    TCM_SECRET__SECURITY__MANAGEMENT_API_KEY: "replace-with-management-api-key"
