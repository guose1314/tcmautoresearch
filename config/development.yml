environment:
  name: "development"

# ── CORS：开发环境宽松，允许所有来源 ──
api:
  cors_origins:
    - "*"
  cors_methods:
    - "*"
  cors_headers:
    - "*"

web_console:
  cors_origins:
    - "*"
  cors_methods:
    - "*"
  cors_headers:
    - "*"

database:
  path: "./data/development/tcmautoresearch.db"

output:
  directory: "./output/development"
  backup_directory: "./backup/development"

logging:
  file: "./logs/development/tcmautoresearch.log"

models:
  llm:
    cache_dir: "./cache/llm/development"

web_console:
  job_storage_dir: "./output/development/web_console_jobs"

# ── 图数据库：开发环境默认启用 Neo4j ──
neo4j:
  enabled: true
  uri: "neo4j://localhost:7687"
  user: "neo4j"
  password_env: "TCM_NEO4J_PASSWORD"