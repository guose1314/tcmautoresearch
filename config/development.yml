environment:
  name: "development"

# ── CORS：开发环境宽松，允许所有来源 ──
api:
  cors_origins:
    - "*"
  cors_methods:
    - "*"
  cors_headers:
    - "*"

web_console:
  cors_origins:
    - "*"
  cors_methods:
    - "*"
  cors_headers:
    - "*"
  job_storage_dir: "./output/development/web_console_jobs"

database:
  type: "postgresql"
  host: "127.0.0.1"
  port: 5432
  name: "tcmautoresearch"
  user: "postgres"
  password_env: "TCM_DB_PASSWORD"

output:
  directory: "./output/development"
  backup_directory: "./backup/development"

logging:
  file: "./logs/development/tcmautoresearch.log"

models:
  llm:
    cache_dir: "./cache/llm/development"

# web_console job_storage_dir 已合并到上方 web_console 块

# ── 图数据库：开发环境默认启用 Neo4j ──
neo4j:
  enabled: true
  uri: "neo4j://127.0.0.1:7687"
  user: "neo4j"
  password_env: "TCM_NEO4J_PASSWORD"
  database: "neo4j"