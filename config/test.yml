environment:
  name: "test"

database:
  path: "./data/test/tcmautoresearch.db"

output:
  directory: "./output/test"
  backup_directory: "./backup/test"

logging:
  file: "./logs/test/tcmautoresearch.log"

models:
  llm:
    cache_dir: "./cache/llm/test"
    small_model_optimizer:
      enabled: true
      benchmark:
        output_dir: "./output/test/phase_benchmarks"
      benchmark_thresholds:                 # Phase I-3：测试环境放宽，避免噪声触发学习
        template_default_hit_rate_target: 0.6
        budget_proceed_hit_rate_target: 0.7
        layer_top_hit_rate_target: 0.4
        skip_rate_max: 0.4
        decompose_rate_max: 0.4

modules:
  document_preprocessing:
    timeout: 5
    max_input_chars: 100000
  entity_extraction:
    threshold: 0.5

web_console:
  job_storage_dir: "./output/test/web_console_jobs"