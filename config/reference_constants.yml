# config/reference_constants.yml
# ────────────────────────────────────────────────────────────────
# 归档文件：原先硬编码在 __init__.py 中的静态常量已迁移至此。
# 这些常量实际上未被任何模块导入使用（dead code），
# 为避免导入开销已从 __init__.py 中移除，保留此文件作为参考。
# ────────────────────────────────────────────────────────────────

# ═══════════════════════════════════════════════════════════════
# 来源: src/core/__init__.py
# ═══════════════════════════════════════════════════════════════

core_system_config:
  system_info:
    name: 中医古籍全自动研究系统
    version: "2.0.0"
    standards:
      - T/C IATCM 098-2023
      - GB/T 15657
      - ISO 21000
    principles:
      - 系统性原则
      - 科学性原则
      - 实用性原则
      - 创新性原则
  module_architecture:
    module_types:
      - preprocessing
      - extraction
      - modeling
      - reasoning
      - output
      - learning
      - analysis
      - research
    dependency_graph:
      preprocessing: [input]
      extraction: [preprocessing]
      modeling: [extraction]
      reasoning: [modeling]
      output: [reasoning]
      learning: [output, reasoning]
      analysis: [output, learning]
      research: [analysis, learning]
  quality_requirements:
    scientific_validity: 0.95
    methodological_quality: 0.90
    reproducibility: 0.95
    standard_compliance: 0.98
    performance_threshold: 0.85
  performance_target:
    max_processing_time: 300
    memory_usage_limit: 2048
    concurrent_requests: 10
    throughput: 1000

module_registry_config:
  registry_info:
    name: 模块注册中心
    version: "2.0.0"
    registration_policy: strict
    validation_level: high
  module_validation:
    interface_compliance: true
    quality_assurance: true
    academic_compliance: true
    performance_benchmark: true
  module_lifecycle:
    creation: created
    initialization: initialized
    activation: active
    deactivation: inactive
    termination: terminated

core_components:
  architecture:
    name: 系统架构
    description: 系统整体架构管理
    version: "2.0.0"
    status: active
  module_manager:
    name: 模块管理器
    description: 模块注册、加载和管理
    version: "2.0.0"
    status: active
  interface_manager:
    name: 接口管理器
    description: 模块接口标准化管理
    version: "2.0.0"
    status: active
  performance_monitor:
    name: 性能监控器
    description: 系统性能实时监控
    version: "2.0.0"
    status: active

version_compatibility:
  python: ">=3.8"
  numpy: ">=1.21.0"
  pandas: ">=1.3.0"
  torch: ">=1.9.0"
  transformers: ">=4.20.0"
  networkx: ">=2.6.0"

security_config:
  data_encryption: true
  access_control: true
  audit_logging: true
  data_privacy: true
  compliance_monitoring: true

monitoring_config:
  performance_metrics:
    - cpu_usage
    - memory_usage
    - disk_usage
    - network_usage
    - processing_time
    - throughput
  quality_metrics:
    - compliance_score
    - accuracy_score
    - consistency_score
    - reliability_score
  academic_metrics:
    - scientific_validity
    - methodological_quality
    - reproducibility
    - standard_compliance

# ═══════════════════════════════════════════════════════════════
# 来源: src/research/__init__.py
# ═══════════════════════════════════════════════════════════════

research_system_config:
  research_framework:
    name: 中医古籍全自动研究框架
    version: "2.0.0"
    standards:
      - T/C IATCM 098-2023
      - GB/T 15657
      - ISO 21000
    principles:
      - 系统性原则
      - 科学性原则
      - 实用性原则
      - 创新性原则
  research_phases:
    - 观察
    - 假设
    - 实验方案设计
    - 外部实验结果导入
    - 分析
    - 发布
    - 反思
  academic_levels:
    basic: 基础研究
    applied: 应用研究
    innovative: 创新研究
    comprehensive: 综合研究
  evaluation_metrics:
    scientific_validity: 0.3
    methodological_quality: 0.25
    innovation_degree: 0.2
    practical_value: 0.25

research_paradigms:
  traditional:
    name: 传统研究范式
    characteristics: [经验总结, 案例分析, 理论归纳]
    applications: [古籍整理, 经验传承, 理论建构]
  modern:
    name: 现代研究范式
    characteristics: [数据驱动, 模型构建, 实证分析]
    applications: [知识发现, 智能推理, 预测建模]
  hybrid:
    name: 混合研究范式
    characteristics: [传统+现代, 定性+定量, 经验+理论]
    applications: [智能古籍研究, 跨学科融合, 系统工程]

research_methods:
  qualitative:
    name: 定性研究方法
    approaches: [文本分析, 案例研究, 专家访谈]
    tools: [内容分析, 主题分析, 话语分析]
  quantitative:
    name: 定量研究方法
    approaches: [统计分析, 机器学习, 数据挖掘]
    tools: [TF-IDF, Word2Vec, BERT]
  mixed:
    name: 混合研究方法
    approaches: [混合分析, 多方法融合, 跨学科研究]
    tools: [多模态分析, 知识图谱, 深度学习]

academic_standards:
  ethics:
    data_privacy: 严格遵守数据隐私保护规定
    research_integrity: 确保研究过程的客观性和真实性
    citation_standard: 遵循GB/T 7714-2015标准
  quality_control:
    peer_review: 实施同行评议制度
    reproducibility: 确保研究结果可重现
    validation: 建立多维度验证机制
  publication_requirements:
    journal_standards: [SCI, EI, 核心期刊]
    format_requirements: [学术论文, 研究报告, 技术报告]
    review_process: [初审, 外审, 终审]

# ═══════════════════════════════════════════════════════════════
# 来源: src/cycle/__init__.py
# ═══════════════════════════════════════════════════════════════

cycle_system_config:
  iteration_framework:
    name: 中医古籍全自动研究迭代框架
    version: "2.0.0"
    iteration_phases:
      - GENERATE
      - TEST
      - FIX
      - ANALYZE
      - OPTIMIZE
      - VALIDATE
  performance_target:
    max_iterations: 10
    timeout_seconds: 300
    max_concurrent_tasks: 4
    min_confidence_threshold: 0.7

iteration_modes:
  sequential:
    name: 顺序迭代
    description: 严格按照顺序执行生成-测试-修复流程
  parallel:
    name: 并行迭代
    description: 多任务并行执行，提高处理效率
  adaptive:
    name: 自适应迭代
    description: 根据执行结果动态调整迭代策略

default_iteration_config:
  max_iterations: 10
  timeout_seconds: 300
  enable_auto_repair: true
  enable_performance_monitoring: true
  enable_test_coverage: true
  auto_retry_attempts: 3
  confidence_threshold: 0.7
  quality_assurance_level: high
