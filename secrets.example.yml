monitoring:
  alerting:
    email:
      smtp_host: "smtp.example.com"
      smtp_port: 587
      username: "alerts@example.com"
      password: "replace-with-real-password"
      sender: "alerts@example.com"
      use_tls: true
    webhook_url: "https://hooks.example.com/services/replace/me"

# ── 数据库密码（生产环境 PostgreSQL + Neo4j）──
database:
  password: "replace-with-postgresql-password"   # 对应环境变量 TCM_DB_PASSWORD

neo4j:
  password: "replace-with-neo4j-password"        # 对应环境变量 TCM_NEO4J_PASSWORD

models:
  llm:
    api_key: "replace-with-llm-api-key"

clinical_gap_analysis:
  api_key: "replace-with-gap-analysis-api-key-if-different"

literature_retrieval:
  pubmed_email: "research@example.com"
  pubmed_api_key: "replace-with-pubmed-api-key"
  source_credentials:
    google_scholar:
      api_key: "replace-with-google-scholar-provider-key-if-used"
    cochrane:
      api_key: "replace-with-cochrane-key-if-used"
    embase:
      api_key: "replace-with-embase-key-if-used"
    scopus:
      api_key: "replace-with-scopus-key-if-used"
    web_of_science:
      api_key: "replace-with-web-of-science-key-if-used"
    lexicomp:
      api_key: "replace-with-lexicomp-key-if-used"
    clinicalkey:
      api_key: "replace-with-clinicalkey-key-if-used"

security:
  management_api_key: "replace-with-management-api-key"
  console_auth:
    session_ttl_seconds: 43200
    users:
      - username: "researcher"
        password: "replace-with-console-password"
        display_name: "科研控制台管理员"