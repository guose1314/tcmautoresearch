version: "3.9"

services:
  tcmautoresearch:
    build:
      context: .
      dockerfile: Dockerfile
    image: tcmautoresearch:local
    container_name: tcmautoresearch-app
    ports:
      - "8000:8000"
    environment:
      TCM_ENV: production
      TCM_LOG_LEVEL: WARNING
    volumes:
      - ./config.yml:/app/config.yml:ro
      - ./config:/app/config:ro
      - ./secrets.yml:/app/secrets.yml:ro
      - ./output:/app/output
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/liveness', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
